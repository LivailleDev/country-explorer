[build]
  command = "npm run build"
  publish = "dist"

# Vite 8 / TypeScript 6 need a modern Node; pin it so Netlify doesn't default to
# an older version and fail the build.
[build.environment]
  NODE_VERSION = "22"

# Single-page app: let React Router handle client-side routes so a direct hit or
# refresh on /country/BRA still serves the app instead of a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
